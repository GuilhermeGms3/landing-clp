name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/reusable-ci-cd.yml
    with:
      node_version: "20"
      run_deploy: true
      deploy_path: "/home/guilherme/apps/clpengenharia"
      deploy_branch: "main"
      deploy_repo_url: "https://github.com/GuilhermeGms3/landing-clp.git"
      compose_command: "docker-compose"
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
