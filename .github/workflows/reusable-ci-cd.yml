name: Reusable CI/CD

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version used in CI
        required: false
        default: "20"
        type: string
      run_deploy:
        description: Whether deploy job should run
        required: false
        default: true
        type: boolean
      deploy_path:
        description: Path of project on target VM
        required: false
        default: "/home/guilherme/apps/clpengenharia"
        type: string
      deploy_branch:
        description: Branch to deploy
        required: false
        default: "main"
        type: string
      compose_command:
        description: Docker compose command on VM (docker-compose or docker compose)
        required: false
        default: "docker-compose"
        type: string
    secrets:
      SSH_HOST:
        required: false
      SSH_USER:
        required: false
      SSH_PRIVATE_KEY:
        required: false

jobs:
  ci:
    name: CI (Typecheck + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: ci
    if: inputs.run_deploy && github.event_name == 'push' && github.ref == format('refs/heads/{0}', inputs.deploy_branch)

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            cd "${{ inputs.deploy_path }}"

            git fetch origin "${{ inputs.deploy_branch }}"
            git checkout "${{ inputs.deploy_branch }}"
            git pull --ff-only origin "${{ inputs.deploy_branch }}"

            ${{ inputs.compose_command }} up -d --build --remove-orphans
            docker image prune -f
