http:
  routers:
    hub:
      rule: "Host(`hub.proxy`) || (Host(`proxy.tail7edf1c.ts.net`) && PathPrefix(`/hub`))"
      entryPoints:
        - web
      service: hub-service
      middlewares:
        - hub-strip-prefix

  services:
    hub-service:
      loadBalancer:
        servers:
          - url: "http://100.72.95.93:3005"

  middlewares:
    hub-strip-prefix:
      stripPrefix:
        prefixes:
          - "/hub"
